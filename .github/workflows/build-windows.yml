name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller gpc_converter_gui.spec --clean --noconfirm

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path "dist\GPC Converter\*" -DestinationPath "GPC_Converter_Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpc-converter-windows
          path: GPC_Converter_Windows.zip
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: GPC_Converter_Windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
