name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # Needed to create releases and upload assets

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller gpc_converter_gui.spec --clean --noconfirm

      - name: Create release artifact
        run: |
          Compress-Archive -Path "dist\GPC Converter.exe" -DestinationPath "GPC_Converter_Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpc-converter-windows
          path: GPC_Converter_Windows.zip
          retention-days: 30

      - name: Create Release
        id: create_release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: GPC_Converter_Windows.zip
          generate_release_notes: true
          name: Release ${{ github.ref_name }}
          body: |
            ## GPC Converter ${{ github.ref_name }}

            ### Windows Executable
            Download `GPC_Converter_Windows.zip`, extract, and run `GPC Converter.exe`.

            ### Installation
            - Extract the ZIP file
            - Double-click `GPC Converter.exe` to run
            - No installation required (portable)

            ### Changes
            See commit history for details.
